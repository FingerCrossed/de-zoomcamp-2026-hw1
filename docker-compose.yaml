services:

  pgdatabase:
    image: postgres:15
    container_name: zoomcamp_pgdatabase
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ny_taxi
    ports:
      - "5433:5432"
    volumes:
      - ny_taxi_postgres_data:/var/lib/postgresql/data

  pgadmin:
    image: dpage/pgadmin4
    container_name: zoomcamp_pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.com
      PGADMIN_DEFAULT_PASSWORD: root
    ports:
      - "8085:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
    depends_on:
      - pgdatabase

  kestra_postgres:
    image: postgres:15
    container_name: zoomcamp_kestra_postgres
    environment:
      POSTGRES_DB: kestra
      POSTGRES_USER: kestra
      POSTGRES_PASSWORD: k3str4
    volumes:
      - kestra_postgres_data:/var/lib/postgresql/data

  kestra:
    image: kestra/kestra:v1.1
    container_name: zoomcamp_kestra
    user: root
    command: server standalone
    ports:
      - "8080:8080"
      - "8081:8081"
    volumes:
      - kestra_data:/app/storage
      - kestra_tmp:/tmp/kestra-wd
      - ./hw2-workflow-orchestration/flows:/app/flows
      - /var/run/docker.sock:/var/run/docker.sock

    environment:
      SECRET_GCP_CREDS: ${SECRET_GCP_CREDS}
      KESTRA_CONFIGURATION: |
        datasources:
          postgres:
            url: jdbc:postgresql://kestra_postgres:5432/kestra
            driverClassName: org.postgresql.Driver
            username: kestra
            password: k3str4
          
        
        kestra:
          ai:
            type: gemini
            gemini:
              model-name: gemini-2.5-flash
              api-key: ${GEMINI_API_KEY_Kestra}
              
          server:
            basicAuth:
              username: admin@kestra.io
              password: Admin1234!

          repository:
            type: postgres

          queue:
            type: postgres

          storage:
            type: local
            local:
              basePath: /app/storage

          tasks:
            tmpDir:
              path: /tmp/kestra-wd/tmp

          url: http://localhost:8080/

    depends_on:
      - kestra_postgres

volumes:
  ny_taxi_postgres_data:
  pgadmin_data:
  kestra_postgres_data:
  kestra_data:
  kestra_tmp: